<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <!-- Home Icon opens the Home page as required -->
      <ion-button routerLink="/home">
        <ion-icon slot="icon-only" name="home"></ion-icon>
      </ion-button>
    </ion-buttons>
    
    <ion-title>{{ movie?.title }}</ion-title>

    <ion-buttons slot="end">
      <!-- Favourites Icon opens the Favourites page as required -->
      <ion-button routerLink="/favourites">
        <ion-icon slot="icon-only" name="heart"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">
  <div *ngIf="movie">
    <!-- Movie Overview Section -->
    <p style="color: #333; font-size: 1.05em; line-height: 1.4; margin-bottom: 20px;">
      {{ movie.overview }}
    </p>

    <!-- Favourites Button Logic (Matching Fig 4 & Fig 5) -->
    <!-- ADD button is white (outline style) -->

<ion-button *ngIf="!isFav()" (click)="toggleFavourite()" fill="outline" color="primary" 
            style="--border-width: 1.5px; font-weight: 600; font-size: 0.75em; height: 36px; margin-bottom: 30px; letter-spacing: 0.05em; border-radius: 4px; background: white;">
  <ion-icon name="heart-outline" slot="start" style="font-size: 1.4em;"></ion-icon>
  ADD TO FAVOURITES
</ion-button>

<ion-button *ngIf="isFav()" (click)="toggleFavourite()" fill="solid" color="primary" 
            style="font-weight: 600; font-size: 0.75em; height: 36px; margin-bottom: 30px; letter-spacing: 0.05em; border-radius: 4px;">
  <ion-icon name="heart" slot="start" style="font-size: 1.4em;"></ion-icon>
  REMOVE FROM FAVOURITES
</ion-button>

<h2 style="font-size: 1.8em; margin: 20px 0; font-weight: normal; color: #000;">Cast</h2>

<div *ngFor="let actor of cast | slice:0:5" 
     style="border: 1px solid #e0e0e0; margin-bottom: 20px; border-radius: 4px; overflow: hidden; background: #fff; max-width: 320px; margin-left: 0;">
  
  <img [src]="'https://image.tmdb.org/t/p/w500' + actor.profile_path" 
       style="width: 100%; display: block; object-fit: cover; height: 350px;"
       onerror="this.src='https://via.placeholder.com/500x750?text=No+Image'"/>
  
  <div style="padding: 15px;">
    <h3 style="margin: 0; font-size: 1.15em; font-weight: normal; color: #333;">
      {{ actor.character }}
    </h3>
    <p style="margin: 4px 0 0 0; font-size: 0.85em; color: #777;">
      {{ actor.name }}
    </p>
  </div>
</div>

    <h2 style="font-size: 1.8em; margin: 35px 0 15px 0; font-weight: normal; color: #000;">Crew</h2>
    
    <!-- Crew List (Matching the simple text style in Fig 4) -->
    <div *ngFor="let member of crew | slice:0:10" style="margin-bottom: 18px;">
        <h4 style="margin: 0; font-weight: bold; font-size: 0.95em; color: #333;">{{ member.name }}</h4>
        <p style="margin: 2px 0 0 0; font-size: 0.85em; color: #666;">{{ member.job }}</p>
    </div>
  </div>
</ion-content>
