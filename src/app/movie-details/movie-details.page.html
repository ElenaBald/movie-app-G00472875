<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home"></ion-back-button>
    </ion-buttons>
    <ion-title>{{ movie?.title }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">
  <div *ngIf="movie">
    <!-- Movie Poster Section -->
    <div class="ion-text-center" style="margin-bottom: 20px;">
      <img [src]="'https://image.tmdb.org/t/p/w500' + movie.poster_path" 
           style="border-radius: 12px; max-width: 250px; box-shadow: 0 4px 10px rgba(0,0,0,0.3);" />
    </div>
    
    <!-- Overview Section -->
    <h2 style="font-weight: bold;">Overview</h2>
    <p style="color: #444; line-height: 1.6;">{{ movie.overview }}</p>

    <!-- Favourites Button -->
    <ion-button expand="block" color="danger" style="margin: 25px 0;">
      <ion-icon name="heart-outline" slot="start"></ion-icon>
      Add to Favourites
    </ion-button>

    <!-- Cast Section (Horizontal Scroll) -->
    <h2 style="font-weight: bold;">Cast</h2>
    <div style="display: flex; overflow-x: auto; padding-bottom: 15px; gap: 15px; -webkit-overflow-scrolling: touch;">
      <div *ngFor="let actor of cast" style="text-align: center; min-width: 110px;">
        <img [src]="'https://image.tmdb.org/t/p/w200' + actor.profile_path" 
             style="width: 90px; height: 90px; border-radius: 50%; object-fit: cover; background: #eee;"
             onerror="this.src='https://via.placeholder.com/90x90?text=No+Image'"/>
        <p style="font-size: 0.9em; margin: 8px 0 2px 0; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">
          {{ actor.name }}
        </p>
        <p style="font-size: 0.8em; color: #666; margin: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">
          {{ actor.character }}
        </p>
      </div>
    </div>

    <!-- Crew Section (List Format) -->
    <h2 style="font-weight: bold; margin-top: 25px;">Crew</h2>
    <ion-list lines="full">
      <ion-item *ngFor="let member of crew | slice:0:15">
        <ion-label>
          <h3 style="font-weight: 600;">{{ member.name }}</h3>
          <p>{{ member.job }}</p>
        </ion-label>
      </ion-item>
    </ion-list>
  </div>
</ion-content>
